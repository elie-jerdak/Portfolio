<!DOCTYPE html>
<html lang="en">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet"/>
        <link href="static/styles.css" rel="stylesheet" />
        
        <style> 
            .title strong {
                color: hsl(155, 100%, 65%);
                /* Multi-layered glow: a crisp core outline + a soft, spread-out neon blur */
                text-shadow: 0 0 10px hsla(155, 100%, 65%, 0.2);
            }
        </style>
    </head>
    <body class="project-body">
        <div id="navbar"></div>
        
        <main>
            <div id="all-projects-container" class="projects-grid"></div>

            <div class="modal fade" id="projectModal" tabindex="-1">

                <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable
                projects-grid .card card my-4">

                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title" id="modalTitle"></h5>
                            <button type="button" class="btn-close btn-close-white"  data-bs-dismiss="modal"></button>
                        </div>


                        <div class="modal-body">
                            <p id="modalDescription"></p>
                            <h6>Technologies</h6>
                            <div id="modalTechnologies" class="tech-stack"></div>
                            <img id="modalImage" class="img-fluid" alt="Project Image">
                        </div>


                        <div class="modal-footer d-flex justify-content-around">
                            <a id="modalGithubLink" target="_blank" class="btn btn-secondary">View on GitHub</a>
                            <a id="modalLink" target="_blank" class="btn btn-primary">Visit Project</a>
                        </div>
                    </div>
                </div>
            </div>
        
        </main>
        
        <div id="footer"></div>

        <script src="/static/components.js"></script>
 
        <!-- Load Bootsrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
         
        <script src="/static/projectsscripts.js"></script>

  </body>
</html>
